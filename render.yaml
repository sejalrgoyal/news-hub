services:
  - type: web
    name: sejal-news-hub
    runtime: node
    rootDir: news-hub-front
    buildCommand: npm install && npm run build
    startCommand: node server/server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEWS_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
